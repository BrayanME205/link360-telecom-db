<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{paquete/form :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-box me-2"></i><span th:text="${modoEdicion}?'Editar Paquete':'Nuevo Paquete'"></span></h2>
            <a th:href="@{/paquetes}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos del Paquete':'Registro de Nuevo Paquete'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/paquetes/editar/{id}(id=${paquete.codPaquete})}:@{/paquetes/nuevo}"
                      th:object="${paquete}" method="post">
                    <div class="mb-3" th:if="${!modoEdicion}">
                        <label class="form-label fw-bold">Código <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" th:field="*{codPaquete}" required/>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Código</label>
                        <input type="text" class="form-control" th:value="${paquete.codPaquete}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{nombre}" required maxlength="100"/>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Capacidad (GB) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{capacidadGB}" required/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Precio (₡) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{precio}" required/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Vigencia (días) <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" th:field="*{vigencia}" required min="1"/>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Paquete'"></span></button>
                        <a th:href="@{/paquetes}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
