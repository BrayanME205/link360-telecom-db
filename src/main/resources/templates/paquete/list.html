<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-box me-2"></i>Paquetes de Datos</h2>
            <a th:href="@{/paquetes/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo Paquete</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Catálogo de Paquetes</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Código</th><th>Nombre</th><th>Capacidad (GB)</th><th>Precio</th><th>Vigencia (días)</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(paquetes)}"><td colspan="7" class="text-center text-muted py-4">No hay paquetes registrados.</td></tr>
                        <tr th:each="p : ${paquetes}">
                            <td th:text="${p.codPaquete}"></td>
                            <td th:text="${p.nombre}"></td>
                            <td th:text="${p.capacidadGB}"></td>
                            <td th:text="'₡' + ${#numbers.formatDecimal(p.precio,1,'COMMA',2,'POINT')}"></td>
                            <td th:text="${p.vigencia}"></td>
                            <td><span th:class="${p.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${p.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/paquetes/editar/{id}(id=${p.codPaquete})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/paquetes/eliminar/{id}(id=${p.codPaquete})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer text-muted" th:if="${!#lists.isEmpty(paquetes)}">Total: <strong th:text="${#lists.size(paquetes)}"></strong> paquete(s)</div>
        </div>
    </th:block></body></html>
