<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-x-circle me-2"></i>Nueva Incompatibilidad de Promociones</h2>
            <a th:href="@{/promo-incompatible}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-body">
                <div class="alert alert-warning"><i class="bi bi-exclamation-triangle me-1"></i>Al guardar, se creará automáticamente la relación inversa (simetría) mediante trigger.</div>
                <form th:action="@{/promo-incompatible/nuevo}" th:object="${registro}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Promoción 1 <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{codPromocion1}" required>
                            <option value="">-- Seleccione --</option>
                            <option th:each="p : ${promociones}" th:value="${p.codPromocion}" th:text="${p.nombre}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Promoción 2 <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{codPromocion2}" required>
                            <option value="">-- Seleccione --</option>
                            <option th:each="p : ${promociones}" th:value="${p.codPromocion}" th:text="${p.nombre}"></option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Registrar</button>
                        <a th:href="@{/promo-incompatible}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
