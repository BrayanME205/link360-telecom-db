<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4"><h2><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirmar Eliminación</h2></div>
        <div class="card shadow-sm border-danger" style="max-width:600px;">
            <div class="card-header bg-danger text-white"><strong>¿Eliminar este registro del historial?</strong></div>
            <div class="card-body">
                <dl class="row mb-3">
                    <dt class="col-sm-4">Línea</dt><dd class="col-sm-8" th:text="${historial.numeroTelefono}"></dd>
                    <dt class="col-sm-4">Paquete</dt><dd class="col-sm-8" th:text="${historial.nombrePaquete}"></dd>
                    <dt class="col-sm-4">Adquisición</dt><dd class="col-sm-8" th:text="${historial.fechaAdquisicion}"></dd>
                </dl>
                <div class="alert alert-info"><i class="bi bi-info-circle me-1"></i>Esta operación elimina únicamente este registro del historial.</div>
                <form th:action="@{/historial-paquetes/eliminar/{n}/{cp}/{f}(n=${historial.numeroTelefono},cp=${historial.codPaquete},f=${historial.fechaAdquisicion})}" method="post">
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
                        <a th:href="@{/historial-paquetes}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
