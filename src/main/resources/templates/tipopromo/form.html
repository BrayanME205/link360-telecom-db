<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-bookmark me-2"></i><span th:text="${modoEdicion}?'Editar Tipo de Promoción':'Nuevo Tipo de Promoción'"></span></h2>
            <a th:href="@{/tipos-promocion}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos del Tipo':'Registro de Nuevo Tipo'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/tipos-promocion/editar/{id}(id=${tipo.tipoPromo})}:@{/tipos-promocion/nuevo}"
                      th:object="${tipo}" method="post">
                    <div class="mb-3" th:if="${!modoEdicion}">
                        <label class="form-label fw-bold">Código de Tipo <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{tipoPromo}" required maxlength="50" placeholder="Ej: DESCUENTO_ESPECIAL"/>
                        <div class="form-text">Este valor es la clave primaria y no podrá cambiarse.</div>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Código de Tipo</label>
                        <input type="text" class="form-control" th:value="${tipo.tipoPromo}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre del Tipo <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{nombreTipo}" required maxlength="100"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Porcentaje Máximo (0-100) <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" min="0" max="100" class="form-control" th:field="*{porcentajeMaximo}" required/>
                        <div class="form-text">Ninguna promoción de este tipo podrá superar este porcentaje.</div>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Tipo'"></span></button>
                        <a th:href="@{/tipos-promocion}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
