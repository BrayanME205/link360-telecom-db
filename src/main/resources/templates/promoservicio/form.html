<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{promoservicio/form :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-arrow-left-right me-2"></i>Nueva Asociación Promoción–Servicio</h2>
            <a th:href="@{/promo-servicio}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-body">
                <form th:action="@{/promo-servicio/nuevo}" th:object="${registro}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Promoción <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{codPromocion}" required>
                            <option value="">-- Seleccione --</option>
                            <option th:each="p : ${promociones}" th:value="${p.codPromocion}" th:text="${p.nombre} + ' (' + ${p.porcDescuento} + '%)'"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Servicio <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{codServicio}" required>
                            <option value="">-- Seleccione --</option>
                            <option th:each="s : ${servicios}" th:value="${s.codServicio}" th:text="${s.nombre}"></option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Registrar</button>
                        <a th:href="@{/promo-servicio}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
