<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{redencion/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-gift me-2"></i>Redenciones de Puntos</h2>
            <a th:href="@{/redenciones/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Redención</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Redenciones Registradas</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Cédula</th><th>Factura #</th><th>Fecha Redención</th><th>Cantidad Redimida</th><th>Saldo Resultante</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(redenciones)}"><td colspan="7" class="text-center text-muted py-4">No hay redenciones registradas.</td></tr>
                        <tr th:each="r : ${redenciones}">
                            <td th:text="${r.cedula}"></td>
                            <td th:text="${r.numFactura}"></td>
                            <td th:text="${#temporals.format(r.fechaRedencion,'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${r.cantidadRedimida}"></td>
                            <td th:text="${r.saldoResultante}"></td>
                            <td><span th:class="${r.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${r.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/redenciones/editar/{c}/{nf}/{f}(c=${r.cedula},nf=${r.numFactura},f=${r.fechaRedencion})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/redenciones/eliminar/{c}/{nf}/{f}(c=${r.cedula},nf=${r.numFactura},f=${r.fechaRedencion})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
