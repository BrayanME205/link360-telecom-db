<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{promopaquete/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-arrow-left-right me-2"></i>Promoción–Paquete</h2>
            <a th:href="@{/promo-paquete/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Asociación</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Promoción</th><th>Paquete</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(registros)}"><td colspan="4" class="text-center text-muted py-4">No hay asociaciones.</td></tr>
                        <tr th:each="r : ${registros}">
                            <td th:text="${r.nombrePromocion}"></td>
                            <td th:text="${r.nombrePaquete}"></td>
                            <td><span th:class="${r.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${r.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <form th:action="@{/promo-paquete/eliminar/{cp}/{pa}(cp=${r.codPromocion},pa=${r.codPaquete})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar esta asociación?')"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
