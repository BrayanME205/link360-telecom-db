<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-tools me-2"></i><span th:text="${modoEdicion}?'Editar Servicio':'Nuevo Servicio'"></span></h2>
            <a th:href="@{/servicios}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos del Servicio':'Registro de Nuevo Servicio'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/servicios/editar/{id}(id=${servicio.codServicio})}:@{/servicios/nuevo}"
                      th:object="${servicio}" method="post">
                    <div class="mb-3" th:if="${!modoEdicion}">
                        <label class="form-label fw-bold">Código <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" th:field="*{codServicio}" required/>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Código</label>
                        <input type="text" class="form-control" th:value="${servicio.codServicio}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{nombre}" required maxlength="100"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3" maxlength="255"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Costo Mensual (₡) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{costoMensual}" required/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Categoría <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{categoria}" required>
                                <option value="">-- Seleccione --</option>
                                <option value="Buzón de voz">Buzón de voz</option>
                                <option value="VPN móvil">VPN móvil</option>
                                <option value="Streaming de video">Streaming de video</option>
                                <option value="Streaming de música">Streaming de música</option>
                                <option value="Otro">Otro</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Servicio'"></span></button>
                        <a th:href="@{/servicios}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
