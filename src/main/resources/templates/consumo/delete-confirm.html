<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{consumo/delete-confirm :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4"><h2><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirmar Eliminación</h2></div>
        <div class="card shadow-sm border-danger" style="max-width:600px;">
            <div class="card-header bg-danger text-white"><strong>¿Eliminar este consumo?</strong></div>
            <div class="card-body">
                <dl class="row mb-3">
                    <dt class="col-sm-4">Código</dt><dd class="col-sm-8" th:text="${consumo.codConsumo}"></dd>
                    <dt class="col-sm-4">Línea</dt><dd class="col-sm-8" th:text="${consumo.numeroTelefono}"></dd>
                    <dt class="col-sm-4">Tipo</dt><dd class="col-sm-8" th:text="${consumo.tipoConsumo}"></dd>
                </dl>
                <div class="alert alert-warning"><h6 class="alert-heading"><i class="bi bi-exclamation-triangle me-1"></i>Advertencia: cascada</h6><p class="mb-0" th:text="${cascadeWarning}"></p></div>
                <form th:action="@{/consumos/eliminar/{id}(id=${consumo.codConsumo})}" method="post">
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
                        <a th:href="@{/consumos}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
