<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{consumo/form-simple :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-bar-chart me-2"></i>Nuevo Consumo <span th:text="${subtipo}"></span></h2>
            <a th:href="@{'/consumos/' + ${subtipo.toLowerCase()}}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-body">
                <div class="alert alert-info mb-3"><i class="bi bi-info-circle me-1"></i>El consumo base debe existir previamente en la tabla CONSUMO.</div>
                <form th:action="@{'/consumos/' + ${subtipo.toLowerCase()} + '/nuevo'}" th:object="${simple}" method="post">
                    <input type="hidden" th:field="*{tipoSubtipo}"/>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Consumo Base <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{codConsumo}" required>
                            <option value="">-- Seleccione consumo --</option>
                            <option th:each="c : ${consumos}"
                                    th:value="${c.codConsumo}"
                                    th:text="'#' + ${c.codConsumo} + ' — ' + ${c.numeroTelefono} + ' (' + ${c.tipoConsumo} + ')'">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3" maxlength="255"></textarea>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Registrar</button>
                        <a th:href="@{'/consumos/' + ${subtipo.toLowerCase()}}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
