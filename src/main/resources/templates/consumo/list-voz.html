<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-telephone-fill me-2"></i>Consumos de Voz</h2>
            <div class="d-flex gap-2">
                <a th:href="@{/consumos/voz/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo</a>
                <a th:href="@{/consumos}" class="btn btn-outline-secondary">Ver todos los consumos</a>
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Cod.Consumo</th><th>N° Destino</th><th>País Destino</th><th>Duración (seg)</th><th>Descripción</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(consumosVoz)}"><td colspan="7" class="text-center text-muted py-4">No hay consumos de voz.</td></tr>
                        <tr th:each="v : ${consumosVoz}">
                            <td th:text="${v.codConsumo}"></td>
                            <td th:text="${v.numDestino}"></td>
                            <td th:text="${v.paisDestino}"></td>
                            <td th:text="${v.duracion}"></td>
                            <td th:text="${v.descripcion}"></td>
                            <td><span th:class="${v.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${v.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/consumos/voz/editar/{id}(id=${v.codConsumo})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/consumos/voz/eliminar/{id}(id=${v.codConsumo})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar este consumo de voz?')"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
