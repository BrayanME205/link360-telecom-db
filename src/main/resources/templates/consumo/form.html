<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{consumo/form :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-bar-chart me-2"></i><span th:text="${modoEdicion}?'Editar Consumo':'Nuevo Consumo'"></span></h2>
            <a th:href="@{/consumos}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:750px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos del Consumo':'Registro de Nuevo Consumo'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/consumos/editar/{id}(id=${consumo.codConsumo})}:@{/consumos/nuevo}"
                      th:object="${consumo}" method="post">
                    <div class="row">
                        <div class="col-md-4 mb-3" th:if="${!modoEdicion}">
                            <label class="form-label fw-bold">Código <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{codConsumo}" required/>
                        </div>
                        <div class="col-md-4 mb-3" th:if="${modoEdicion}">
                            <label class="form-label fw-bold">Código</label>
                            <input type="text" class="form-control" th:value="${consumo.codConsumo}" readonly/>
                        </div>
                        <div class="col-md-8 mb-3">
                            <label class="form-label fw-bold">Línea Móvil <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{numeroTelefono}" required>
                                <option value="">-- Seleccione --</option>
                                <option th:each="l : ${lineas}" th:value="${l.numeroTelefono}"
                                        th:text="${l.numeroTelefono}"
                                        th:selected="${consumo.numeroTelefono == l.numeroTelefono}"></option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descuento Aplicado (opcional)</label>
                        <select class="form-select" th:field="*{codDescuento}">
                            <option value="">-- Sin descuento --</option>
                            <option th:each="d : ${descuentos}" th:value="${d.codDescuento}"
                                    th:text="${d.descripcion} + ' (' + ${d.horaInicio} + ' - ' + ${d.horaFin} + ')'"
                                    th:selected="${consumo.codDescuento == d.codDescuento}"></option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Fecha/Hora Inicio <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" th:field="*{fechaHoraInicio}" required/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Fecha/Hora Fin</label>
                            <input type="datetime-local" class="form-control" th:field="*{fechaHoraFin}"/>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Tipo de Consumo <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{tipoConsumo}" required>
                                <option value="">-- Seleccione --</option>
                                <option value="Voz">Voz</option>
                                <option value="SMS">SMS</option>
                                <option value="Datos">Datos</option>
                                <option value="Roaming">Roaming</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Cantidad <span class="text-danger">*</span></label>
                            <input type="number" step="0.0001" class="form-control" th:field="*{cantidad}" required/>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Costo Calculado (₡) <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{costoCalculado}" required/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ámbito <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{ambito}" required>
                            <option value="">-- Seleccione --</option>
                            <option value="Nacional">Nacional</option>
                            <option value="Internacional">Internacional</option>
                            <option value="Roaming Centroamérica">Roaming Centroamérica</option>
                            <option value="Roaming América">Roaming América</option>
                            <option value="Roaming Europa">Roaming Europa</option>
                        </select>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Consumo'"></span></button>
                        <a th:href="@{/consumos}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
