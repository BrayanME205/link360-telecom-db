<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{descuento/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-percent me-2"></i>Descuentos por Horario</h2>
            <a th:href="@{/descuentos/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo Descuento</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Catálogo de Descuentos</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Código</th><th>Descripción</th><th>Hora Inicio</th><th>Hora Fin</th><th>Días</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(descuentos)}"><td colspan="7" class="text-center text-muted py-4">No hay descuentos registrados.</td></tr>
                        <tr th:each="d : ${descuentos}">
                            <td th:text="${d.codDescuento}"></td>
                            <td th:text="${d.descripcion}"></td>
                            <td th:text="${d.horaInicio}"></td>
                            <td th:text="${d.horaFin}"></td>
                            <td th:text="${d.numDias}"></td>
                            <td><span th:class="${d.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${d.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/descuentos/editar/{id}(id=${d.codDescuento})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/descuentos/eliminar/{id}(id=${d.codDescuento})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
