<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4"><h2><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirmar Eliminación</h2></div>
        <div class="card shadow-sm border-warning" style="max-width:600px;">
            <div class="card-header bg-warning"><strong>¿Eliminar este descuento?</strong></div>
            <div class="card-body">
                <dl class="row mb-3">
                    <dt class="col-sm-4">Código</dt><dd class="col-sm-8" th:text="${descuento.codDescuento}"></dd>
                    <dt class="col-sm-4">Descripción</dt><dd class="col-sm-8" th:text="${descuento.descripcion}"></dd>
                    <dt class="col-sm-4">Horario</dt><dd class="col-sm-8" th:text="${descuento.horaInicio} + ' — ' + ${descuento.horaFin}"></dd>
                </dl>
                <div th:if="${cascadeWarning}" class="alert alert-info">
                    <h6 class="alert-heading"><i class="bi bi-info-circle me-1"></i>Advertencia: SET NULL</h6>
                    <p class="mb-0" th:text="${cascadeWarning}"></p>
                </div>
                <div th:if="${cascadeWarning == null}" class="alert alert-success"><i class="bi bi-check-circle me-1"></i>No hay consumos con este descuento aplicado. La eliminación es segura.</div>
                <form th:action="@{/descuentos/eliminar/{id}(id=${descuento.codDescuento})}" method="post">
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
                        <a th:href="@{/descuentos}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
