<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-link-45deg me-2"></i>Línea–Servicio</h2>
            <a th:href="@{/linea-servicio/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Contratación</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Línea</th><th>Servicio</th><th>Fecha Contratación</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(registros)}"><td colspan="5" class="text-center text-muted py-4">No hay registros.</td></tr>
                        <tr th:each="r : ${registros}">
                            <td th:text="${r.numeroTelefono}"></td>
                            <td th:text="${r.nombreServicio}"></td>
                            <td th:text="${#temporals.format(r.fechaContratacion,'dd/MM/yyyy')}"></td>
                            <td><span th:class="${r.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${r.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <form th:action="@{/linea-servicio/eliminar/{n}/{cs}(n=${r.numeroTelefono},cs=${r.codServicio})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Desvincular este servicio?')"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
