<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{factura/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-receipt me-2"></i>Facturas</h2>
            <a th:href="@{/facturas/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Factura</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Facturas Registradas</strong></div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>#</th><th>Línea</th><th>Fecha</th><th>Vencimiento</th><th>Monto Final</th><th>Estado Pago</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(facturas)}"><td colspan="8" class="text-center text-muted py-4">No hay facturas registradas.</td></tr>
                            <tr th:each="f : ${facturas}">
                                <td th:text="${f.numFactura}"></td>
                                <td th:text="${f.numeroTelefono}"></td>
                                <td th:text="${#temporals.format(f.fecha,'dd/MM/yyyy')}"></td>
                                <td th:text="${#temporals.format(f.fechaVencimiento,'dd/MM/yyyy')}"></td>
                                <td th:text="'₡' + ${#numbers.formatDecimal(f.montoFinal,1,'COMMA',2,'POINT')}"></td>
                                <td>
                                    <span th:class="${f.estadoPago=='Pagada'?'badge bg-success':f.estadoPago=='Pendiente'?'badge bg-warning text-dark':'badge bg-danger'}"
                                          th:text="${f.estadoPago}"></span>
                                </td>
                                <td><span th:class="${f.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${f.estado=='A'?'Activo':'Inactivo'}"></span></td>
                                <td class="text-center">
                                    <a th:href="@{/facturas/editar/{id}(id=${f.numFactura})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                    <a th:href="@{/facturas/eliminar/{id}(id=${f.numFactura})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer text-muted" th:if="${!#lists.isEmpty(facturas)}">Total: <strong th:text="${#lists.size(facturas)}"></strong> factura(s)</div>
        </div>
    </th:block></body></html>
