<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{factura/form :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-receipt me-2"></i><span th:text="${modoEdicion}?'Editar Factura':'Nueva Factura'"></span></h2>
            <a th:href="@{/facturas}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:750px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos de la Factura':'Registro de Nueva Factura'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/facturas/editar/{id}(id=${factura.numFactura})}:@{/facturas/nuevo}"
                      th:object="${factura}" method="post">

                    <div class="row">
                        <div class="col-md-6 mb-3" th:if="${!modoEdicion}">
                            <label class="form-label fw-bold">Número de Factura <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{numFactura}" required/>
                        </div>
                        <div class="col-md-6 mb-3" th:if="${modoEdicion}">
                            <label class="form-label fw-bold">Número de Factura</label>
                            <input type="text" class="form-control" th:value="${factura.numFactura}" readonly/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Línea Móvil <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{numeroTelefono}" required>
                                <option value="">-- Seleccione --</option>
                                <option th:each="l : ${lineas}"
                                        th:value="${l.numeroTelefono}"
                                        th:text="${l.numeroTelefono}"
                                        th:selected="${factura.numeroTelefono == l.numeroTelefono}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Fecha <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fecha}" required/>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Fecha Vencimiento <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fechaVencimiento}" required/>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Fecha Pago</label>
                            <input type="date" class="form-control" th:field="*{fechaPago}"/>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Monto <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{monto}" required/>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Impuestos</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{impuestos}" value="0"/>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Descuentos</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{descuentos}" value="0"/>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Puntos Redimidos</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{puntosRedimidos}" value="0"/>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Monto Final <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" class="form-control" th:field="*{montoFinal}" required/>
                            <div class="form-text">Monto + Impuestos - Descuentos - Puntos Redimidos.</div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label class="form-label fw-bold">Estado Pago <span class="text-danger">*</span></label>
                            <select class="form-select" th:field="*{estadoPago}" required>
                                <option value="">-- Seleccione --</option>
                                <option value="Pagada">Pagada</option>
                                <option value="Pendiente">Pendiente</option>
                                <option value="Vencida">Vencida</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3" th:if="${modoEdicion}">
                            <label class="form-label fw-bold">Estado Registro</label>
                            <select class="form-select" th:field="*{estado}">
                                <option value="A">Activo</option><option value="I">Inactivo</option>
                            </select>
                        </div>
                    </div>

                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Factura'"></span></button>
                        <a th:href="@{/facturas}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
