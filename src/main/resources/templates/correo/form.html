<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-envelope me-2"></i><span th:text="${modoEdicion}?'Editar Correo':'Nuevo Correo Electrónico'"></span></h2>
            <a th:href="@{/correos}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos del Correo':'Registro de Nuevo Correo'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/correos/editar/{c}/{e}(c=${correo.cedula},e=${correo.email})}:@{/correos/nuevo}"
                      th:object="${correo}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Cliente <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{cedula}" required th:disabled="${modoEdicion}">
                            <option value="">-- Seleccione un cliente --</option>
                            <option th:each="c : ${clientes}"
                                    th:value="${c.cedula}"
                                    th:text="${c.cedula} + ' — ' + ${c.nombre} + ' ' + ${c.primerApellido}"
                                    th:selected="${correo.cedula == c.cedula}">
                            </option>
                        </select>
                        <input type="hidden" th:if="${modoEdicion}" th:name="cedula" th:value="${correo.cedula}"/>
                    </div>
                    <div class="mb-3" th:if="${!modoEdicion}">
                        <label class="form-label fw-bold">Correo Electrónico <span class="text-danger">*</span></label>
                        <input type="email" class="form-control" th:field="*{email}" required maxlength="150"/>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <input type="text" class="form-control" th:value="${correo.email}" readonly/>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Correo'"></span></button>
                        <a th:href="@{/correos}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
