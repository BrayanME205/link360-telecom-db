<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{correo/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-envelope me-2"></i>Correos Electrónicos</h2>
            <a th:href="@{/correos/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo Correo</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Correos Registrados</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Cliente</th><th>Cédula</th><th>Correo Electrónico</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(correos)}"><td colspan="5" class="text-center text-muted py-4">No hay correos registrados.</td></tr>
                        <tr th:each="c : ${correos}">
                            <td th:text="${c.nombreCliente}"></td>
                            <td th:text="${c.cedula}"></td>
                            <td th:text="${c.email}"></td>
                            <td><span th:class="${c.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${c.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/correos/editar/{cedula}/{email}(cedula=${c.cedula},email=${c.email})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/correos/eliminar/{cedula}/{email}(cedula=${c.cedula},email=${c.email})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
