<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{correo/delete-confirm :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4"><h2><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirmar Eliminación</h2></div>
        <div class="card shadow-sm border-danger" style="max-width:600px;">
            <div class="card-header bg-danger text-white"><strong>¿Eliminar este correo electrónico?</strong></div>
            <div class="card-body">
                <dl class="row mb-3">
                    <dt class="col-sm-4">Cliente</dt><dd class="col-sm-8" th:text="${correo.nombreCliente}"></dd>
                    <dt class="col-sm-4">Correo</dt><dd class="col-sm-8" th:text="${correo.email}"></dd>
                </dl>
                <div class="alert alert-info"><i class="bi bi-info-circle me-1"></i>Esta operación elimina únicamente este correo. No afecta otros registros del cliente.</div>
                <form th:action="@{/correos/eliminar/{c}/{e}(c=${correo.cedula},e=${correo.email})}" method="post">
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
                        <a th:href="@{/correos}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
