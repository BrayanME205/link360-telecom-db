<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{lineaplan/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-link me-2"></i>Histórico Línea–Plan</h2>
            <a th:href="@{/linea-plan/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Contratación</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Línea</th><th>Plan</th><th>Inicio</th><th>Fin</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(registros)}"><td colspan="6" class="text-center text-muted py-4">No hay registros.</td></tr>
                        <tr th:each="r : ${registros}">
                            <td th:text="${r.numeroTelefono}"></td>
                            <td th:text="${r.nombrePlan}"></td>
                            <td th:text="${#temporals.format(r.fechaInicio,'dd/MM/yyyy')}"></td>
                            <td th:text="${r.fechaFin != null ? #temporals.format(r.fechaFin,'dd/MM/yyyy') : 'Activo'}"></td>
                            <td><span th:class="${r.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${r.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <form th:if="${r.fechaFin == null}" th:action="@{/linea-plan/finalizar/{n}/{cp}/{f}(n=${r.numeroTelefono},cp=${r.codPlan},f=${r.fechaInicio})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-warning me-1" onclick="return confirm('¿Finalizar este plan hoy?')">Finalizar</button>
                                </form>
                                <form th:action="@{/linea-plan/eliminar/{n}/{cp}/{f}(n=${r.numeroTelefono},cp=${r.codPlan},f=${r.fechaInicio})}" method="post" style="display:inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('¿Eliminar este registro?')"><i class="bi bi-trash"></i></button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
