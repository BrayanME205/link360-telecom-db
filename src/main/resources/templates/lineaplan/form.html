<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-link me-2"></i>Nueva Contratación de Plan</h2>
            <a th:href="@{/linea-plan}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-body">
                <form th:action="@{/linea-plan/nuevo}" th:object="${registro}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Línea Móvil <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{numeroTelefono}" required>
                            <option value="">-- Seleccione --</option>
                            <option th:each="l : ${lineas}" th:value="${l.numeroTelefono}" th:text="${l.numeroTelefono}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Plan <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{codPlan}" required>
                            <option value="">-- Seleccione --</option>
                            <option th:each="p : ${planes}" th:value="${p.codPlan}" th:text="${p.nombre} + ' — ₡' + ${p.cuotaMensual}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Fecha de Inicio <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" th:field="*{fechaInicio}" required/>
                        <div class="form-text">Dejar la fecha de fin vacía indica que es el plan activo actualmente.</div>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Registrar</button>
                        <a th:href="@{/linea-plan}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
