<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{direccion/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-geo-alt me-2"></i>Direcciones</h2>
            <a th:href="@{/direcciones/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Dirección</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Direcciones Registradas</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Cliente</th><th>Cédula</th><th>Dirección</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(direcciones)}"><td colspan="5" class="text-center text-muted py-4">No hay direcciones registradas.</td></tr>
                        <tr th:each="d : ${direcciones}">
                            <td th:text="${d.nombreCliente}"></td>
                            <td th:text="${d.cedula}"></td>
                            <td th:text="${d.direccion}"></td>
                            <td><span th:class="${d.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${d.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/direcciones/editar/{cedula}(cedula=${d.cedula})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/direcciones/eliminar/{cedula}(cedula=${d.cedula})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
