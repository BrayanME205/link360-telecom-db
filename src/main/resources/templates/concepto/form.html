<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-list-check me-2"></i><span th:text="${modoEdicion}?'Editar Concepto':'Nuevo Concepto de Cobro'"></span></h2>
            <a th:href="@{/conceptos-cobro}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos del Concepto':'Registro de Nuevo Concepto'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/conceptos-cobro/editar/{nf}/{t}(nf=${concepto.numFactura},t=${concepto.tipoConcepto})}:@{/conceptos-cobro/nuevo}"
                      th:object="${concepto}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Factura <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{numFactura}" required th:disabled="${modoEdicion}">
                            <option value="">-- Seleccione factura --</option>
                            <option th:each="f : ${facturas}"
                                    th:value="${f.numFactura}"
                                    th:text="'Factura #' + ${f.numFactura} + ' — ₡' + ${f.montoFinal}"
                                    th:selected="${concepto.numFactura == f.numFactura}">
                            </option>
                        </select>
                        <input type="hidden" th:if="${modoEdicion}" th:name="numFactura" th:value="${concepto.numFactura}"/>
                    </div>
                    <div class="mb-3" th:if="${!modoEdicion}">
                        <label class="form-label fw-bold">Tipo de Concepto <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" th:field="*{tipoConcepto}" required maxlength="50" placeholder="Ej: Plan mensual, Exceso datos"/>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Tipo de Concepto</label>
                        <input type="text" class="form-control" th:value="${concepto.tipoConcepto}" readonly/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="2" maxlength="255"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Monto de Cobro <span class="text-danger">*</span></label>
                        <input type="number" step="0.01" class="form-control" th:field="*{montoCobro}" required/>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Concepto'"></span></button>
                        <a th:href="@{/conceptos-cobro}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
