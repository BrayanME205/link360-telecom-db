<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{concepto/delete-confirm :: content})}">
    <body><th:block th:fragment="content">
        <div class="mb-4"><h2><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirmar Eliminación</h2></div>
        <div class="card shadow-sm border-danger" style="max-width:600px;">
            <div class="card-header bg-danger text-white"><strong>¿Eliminar este concepto de cobro?</strong></div>
            <div class="card-body">
                <dl class="row mb-3">
                    <dt class="col-sm-4">Factura #</dt><dd class="col-sm-8" th:text="${concepto.numFactura}"></dd>
                    <dt class="col-sm-4">Tipo</dt><dd class="col-sm-8" th:text="${concepto.tipoConcepto}"></dd>
                    <dt class="col-sm-4">Monto</dt><dd class="col-sm-8" th:text="'₡' + ${concepto.montoCobro}"></dd>
                </dl>
                <div class="alert alert-info"><i class="bi bi-info-circle me-1"></i>Esta operación elimina únicamente este concepto. No afecta la factura ni otros registros.</div>
                <form th:action="@{/conceptos-cobro/eliminar/{nf}/{t}(nf=${concepto.numFactura},t=${concepto.tipoConcepto})}" method="post">
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
                        <a th:href="@{/conceptos-cobro}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
