<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-megaphone me-2"></i><span th:text="${modoEdicion}?'Editar Promoción':'Nueva Promoción'"></span></h2>
            <a th:href="@{/promociones}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:700px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos de la Promoción':'Registro de Nueva Promoción'"></strong></div>
            <div class="card-body">
                <div class="alert alert-warning mb-3"><i class="bi bi-exclamation-triangle me-1"></i>El porcentaje de descuento no puede superar el máximo del tipo de promoción seleccionado.</div>
                <form th:action="${modoEdicion}?@{/promociones/editar/{id}(id=${promocion.codPromocion})}:@{/promociones/nuevo}"
                      th:object="${promocion}" method="post">
                    <div class="row">
                        <div class="col-md-4 mb-3" th:if="${!modoEdicion}">
                            <label class="form-label fw-bold">Código <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{codPromocion}" required/>
                        </div>
                        <div class="col-md-4 mb-3" th:if="${modoEdicion}">
                            <label class="form-label fw-bold">Código</label>
                            <input type="text" class="form-control" th:value="${promocion.codPromocion}" readonly/>
                        </div>
                        <div class="col-md-8 mb-3">
                            <label class="form-label fw-bold">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:field="*{nombre}" required maxlength="100"/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de Promoción <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{tipoPromo}" required>
                            <option value="">-- Seleccione --</option>
                            <option th:each="t : ${tipos}"
                                    th:value="${t.tipoPromo}"
                                    th:text="${t.nombreTipo} + ' (máx. ' + ${t.porcentajeMaximo} + '%)'"
                                    th:selected="${promocion.tipoPromo == t.tipoPromo}">
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="2" maxlength="255"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Fecha Inicio <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fechaInicio}" required/>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Fecha Fin <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" th:field="*{fechaFin}" required/>
                            <div class="form-text">Debe ser mayor o igual a la fecha de inicio.</div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">% Descuento <span class="text-danger">*</span></label>
                            <input type="number" step="0.01" min="0" max="100" class="form-control" th:field="*{porcDescuento}" required/>
                        </div>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Promoción'"></span></button>
                        <a th:href="@{/promociones}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
