<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-megaphone me-2"></i>Promociones</h2>
            <a th:href="@{/promociones/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Promoción</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Promociones Registradas</strong></div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead><tr><th>#</th><th>Nombre</th><th>Tipo</th><th>% Descuento</th><th>Inicio</th><th>Fin</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(promociones)}"><td colspan="8" class="text-center text-muted py-4">No hay promociones registradas.</td></tr>
                            <tr th:each="p : ${promociones}">
                                <td th:text="${p.codPromocion}"></td>
                                <td th:text="${p.nombre}"></td>
                                <td th:text="${p.tipoPromo}"></td>
                                <td th:text="${p.porcDescuento} + '%'"></td>
                                <td th:text="${#temporals.format(p.fechaInicio,'dd/MM/yyyy')}"></td>
                                <td th:text="${#temporals.format(p.fechaFin,'dd/MM/yyyy')}"></td>
                                <td><span th:class="${p.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${p.estado=='A'?'Activo':'Inactivo'}"></span></td>
                                <td class="text-center">
                                    <a th:href="@{/promociones/editar/{id}(id=${p.codPromocion})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                    <a th:href="@{/promociones/eliminar/{id}(id=${p.codPromocion})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </th:block></body></html>
