<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{categoria/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-tag me-2"></i>Categorías Comerciales</h2>
            <a th:href="@{/categorias/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nueva Categoría</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Catálogo de Categorías</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Código</th><th>Descripción</th><th>Velocidad Máxima</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(categorias)}"><td colspan="5" class="text-center text-muted py-4">No hay categorías registradas.</td></tr>
                        <tr th:each="c : ${categorias}">
                            <td th:text="${c.codCategoria}"></td>
                            <td th:text="${c.descripcion}"></td>
                            <td th:text="${c.velocidadMaxima}"></td>
                            <td><span th:class="${c.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${c.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/categorias/editar/{id}(id=${c.codCategoria})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/categorias/eliminar/{id}(id=${c.codCategoria})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
