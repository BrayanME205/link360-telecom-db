<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{puntos/list :: content})}">
    <body><th:block th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-star me-2"></i>Puntos de Fidelización</h2>
            <a th:href="@{/puntos/nuevo}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Nuevo Registro</a>
        </div>
        <div class="card shadow-sm">
            <div class="card-header"><strong>Registros de Puntos</strong></div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead><tr><th>Cliente</th><th>Cédula</th><th>Factura #</th><th>Puntos Asignados</th><th>Saldo Actual</th><th>Estado</th><th class="text-center">Acciones</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(puntos)}"><td colspan="7" class="text-center text-muted py-4">No hay registros de puntos.</td></tr>
                        <tr th:each="p : ${puntos}">
                            <td th:text="${p.nombreCliente}"></td>
                            <td th:text="${p.cedula}"></td>
                            <td th:text="${p.numFactura}"></td>
                            <td th:text="${p.puntosAsignados}"></td>
                            <td><strong th:text="${p.saldoActual}"></strong></td>
                            <td><span th:class="${p.estado=='A'?'badge bg-success':'badge bg-secondary'}" th:text="${p.estado=='A'?'Activo':'Inactivo'}"></span></td>
                            <td class="text-center">
                                <a th:href="@{/puntos/editar/{c}/{nf}(c=${p.cedula},nf=${p.numFactura})}" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/puntos/eliminar/{c}/{nf}(c=${p.cedula},nf=${p.numFactura})}" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </th:block></body></html>
