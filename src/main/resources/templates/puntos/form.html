<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: content}">
    <body><th:block th:fragment="content">
        <div class="mb-4">
            <h2><i class="bi bi-star me-2"></i><span th:text="${modoEdicion}?'Editar Puntos':'Nuevo Registro de Puntos'"></span></h2>
            <a th:href="@{/puntos}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
        </div>
        <div class="card shadow-sm" style="max-width:600px;">
            <div class="card-header"><strong th:text="${modoEdicion}?'Datos de Puntos':'Registro de Nuevos Puntos'"></strong></div>
            <div class="card-body">
                <form th:action="${modoEdicion}?@{/puntos/editar/{c}/{nf}(c=${punto.cedula},nf=${punto.numFactura})}:@{/puntos/nuevo}"
                      th:object="${punto}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Cliente <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{cedula}" required th:disabled="${modoEdicion}">
                            <option value="">-- Seleccione --</option>
                            <option th:each="c : ${clientes}"
                                    th:value="${c.cedula}"
                                    th:text="${c.cedula} + ' — ' + ${c.nombre} + ' ' + ${c.primerApellido}"
                                    th:selected="${punto.cedula == c.cedula}">
                            </option>
                        </select>
                        <input type="hidden" th:if="${modoEdicion}" th:name="cedula" th:value="${punto.cedula}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Factura <span class="text-danger">*</span></label>
                        <select class="form-select" th:field="*{numFactura}" required th:disabled="${modoEdicion}">
                            <option value="">-- Seleccione --</option>
                            <option th:each="f : ${facturas}"
                                    th:value="${f.numFactura}"
                                    th:text="'Factura #' + ${f.numFactura}"
                                    th:selected="${punto.numFactura == f.numFactura}">
                            </option>
                        </select>
                        <input type="hidden" th:if="${modoEdicion}" th:name="numFactura" th:value="${punto.numFactura}"/>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Puntos Asignados <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{puntosAsignados}" required min="0"/>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Saldo Actual <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" th:field="*{saldoActual}" required min="0"/>
                        </div>
                    </div>
                    <div class="mb-3" th:if="${modoEdicion}">
                        <label class="form-label fw-bold">Estado</label>
                        <select class="form-select" th:field="*{estado}">
                            <option value="A">Activo</option><option value="I">Inactivo</option>
                        </select>
                    </div>
                    <hr/>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i><span th:text="${modoEdicion}?'Guardar Cambios':'Registrar Puntos'"></span></button>
                        <a th:href="@{/puntos}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block></body></html>
