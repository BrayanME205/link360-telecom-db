<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{cliente/delete-confirm :: content})}">
<body>
<th:block th:fragment="content">

    <div class="mb-4">
        <h2><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirmar Eliminación</h2>
    </div>

    <div class="card shadow-sm border-danger" style="max-width:650px;">
        <div class="card-header bg-danger text-white">
            <strong>¿Está seguro de que desea eliminar este cliente?</strong>
        </div>
        <div class="card-body">

            <!-- Client summary -->
            <dl class="row mb-3">
                <dt class="col-sm-4">Cédula</dt>
                <dd class="col-sm-8" th:text="${cliente.cedula}"></dd>
                <dt class="col-sm-4">Nombre</dt>
                <dd class="col-sm-8"
                    th:text="${cliente.nombre + ' ' + cliente.primerApellido}"></dd>
                <dt class="col-sm-4">Tipo</dt>
                <dd class="col-sm-8" th:text="${cliente.tipoCliente}"></dd>
            </dl>

            <!-- CASCADE WARNING -->
            <div th:if="${cascadeWarning}" class="alert alert-warning">
                <h6 class="alert-heading">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    Advertencia: eliminación en cascada
                </h6>
                <p class="mb-0" th:text="${cascadeWarning}"></p>
            </div>

            <div th:if="${cascadeWarning == null}" class="alert alert-info">
                <i class="bi bi-info-circle me-1"></i>
                Este cliente no tiene registros relacionados. La eliminación es segura.
            </div>

            <form th:action="@{/clientes/eliminar/{id}(id=${cliente.cedula})}" method="post">
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Sí, eliminar
                    </button>
                    <a th:href="@{/clientes}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</th:block>
</body>
</html>
